<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>디지털 명함</title>
    <style>
        /* 기본 스타일 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            /* 다크 모드 및 배경 그라데이션 */
            background: radial-gradient(circle at top left, #1a1a2e, #16213e, #0f3460);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            overflow: hidden;
        }

        /* 배경 장식용 원형 요소 */
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
        }

        .circle-1 {
            width: 300px;
            height: 300px;
            background: rgba(78, 205, 196, 0.2);
            top: 10%;
            right: 15%;
        }

        .circle-2 {
            width: 400px;
            height: 400px;
            background: rgba(255, 107, 107, 0.15);
            bottom: 5%;
            left: 10%;
        }

        /* 글래스모즘 카드 스타일 */
        .card {
            position: relative;
            z-index: 1;
            width: 350px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
            cursor: pointer;
        }

        /* 카드 마우스 호버 효과 */
        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.5);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* 프로필 이미지 자리 */
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 20px;
            background: linear-gradient(45deg, #4ecdc4, #5562ff);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
        }

        .profile-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 텍스트 스타일링 */
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .description {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 25px;
            line-height: 1.5;
        }

        /* 정보 섹션 */
        .info-container {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }

        .info-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .info-item:hover {
            opacity: 0.7;
        }

        .icon {
            width: 18px;
            height: 18px;
            fill: #4ecdc4;
        }

        /* 하단 버튼/액션 */
        .btn {
            margin-top: 30px;
            padding: 12px 24px;
            background: #ffffff;
            color: #16213e;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #4ecdc4;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <!-- 배경 장식 -->
    <div class="bg-circle circle-1"></div>
    <div class="bg-circle circle-2"></div>

    <!-- 명함 카드 -->
    <div class="card">
        <!-- 프로필 이미지 (이미지가 없을 경우 아이콘/그라데이션 노출) -->
        <div class="profile-img">
            <span>👤</span>
            <!-- 실제 이미지를 넣으려면 아래 주석을 해제하세요 -->
             <img src="./profile.png" alt="내 이미지">
        </div>

        <h1>전예원 (Jeon ye won)</h1>
        <p class="description">창의적인 아이디어를 코드로 구현하는<br>프론트엔드 개발자입니다.</p>

        <div class="info-container">
            <a href="mailto:yew101101@gmail.com" class="info-item">
                <svg class="icon" viewBox="0 0 24 24">
                    <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                </svg>
                yew101101@gmail.com
            </a>
        </div>

        <button class="btn" onclick="copyEmail()">연락처 복사하기</button>
    </div>

    <script>
        function copyEmail() {
            const email = "contact@example.com";
            const tempInput = document.createElement("input");
            tempInput.value = email;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);
            
            // 간단한 알림 UI 피드백 (alert 대신 버튼 텍스트 변경)
            const btn = document.querySelector('.btn');
            const originalText = btn.innerText;
            btn.innerText = "복사 완료!";
            btn.style.background = "#4ecdc4";
            btn.style.color = "#ffffff";
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = "#ffffff";
                btn.style.color = "#16213e";
            }, 2000);
        }
    </script>
</body>
</html>
